    name: Esempi
    description: >-
      Caso d'uso esemplificativo: televisita pneumologica virtuale (classe VR) erogata il 16/06/2025
      dalla U.O. Pneumologia dell'Ospedale Sandro Pertini (ASL Roma 1). La paziente Maria Rossi
      (bronchite cronica nota, non fumatrice) viene visitata dal Dr. Marco Ferrari, Pneumologo,
      su richiesta del suo Medico di Medicina Generale per follow-up della sintomatologia
